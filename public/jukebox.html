<!doctype html>
<html>
    <head>
        <title>Jukebox</title>
        <style>
            body {
                margin: 0;
                background: #111;
                color: #eee;
                font-family: system-ui;
            }
            #info {
                text-align: center;
                padding: 2rem;
            }
            #player {
                display: none;
            }
        </style>
    </head>
    <body>
        <div id="info">
            <h2 id="titlePage">Connexion au jukebox…</h2>
            <button id="startButton">Rejoindre le Jukebox</button>
        </div>
        <div id="player"></div>
        <img id="thumbnail" src="" alt="Thumbnail" />
        <div id="info">
            <h2 id="title">Chargement...</h2>
            <p id="time-display">0:00 / 0:00</p>
            <div id="progress-bar" style="width: 0%; height: 10px; background-color: #007bff"></div>
        </div>
        <div id="volume-container">
            <button id="muteButton">🔊</button>
            <input type="range" id="volumeSlider" min="0" max="100" value="50" />
        </div>
        <div
            id="adblock-warning"
            style="
                display: none;
                position: fixed;
                top: 20%;
                left: 50%;
                transform: translateX(-50%);
                background: #ff4444;
                color: white;
                padding: 20px;
                border-radius: 10px;
                z-index: 1000;
                text-align: center;
            "
        >
            <h3>⚠️ Attention</h3>
            <p>
                Certaines vidéos peuvent être bloquées ou ne pas se lancer à cause de votre bloqueur
                de publicités.
            </p>
            <button onclick="document.getElementById('adblock-warning').style.display = 'none'">
                Compris
            </button>
        </div>

        <script src="https://www.youtube.com/iframe_api"></script>
        <script>
            const OFFSET_TOLERANCE = 5; // seconds

            const streamToken = window.location.pathname.split("/").pop();
            let player;
            let playerReady = false;
            let lastVideoId = null;
            let lastIsPlaying = false;

            async function checkAdBlock() {
                const adUrl = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js";

                try {
                    const response = await fetch(adUrl, { mode: "no-cors" });
                } catch (e) {
                    document.getElementById("adblock-warning").style.display = "block";
                }
            }
            window.addEventListener("load", checkAdBlock);

            function onYouTubeIframeAPIReady() {
                if ("mediaSession" in navigator) {
                    navigator.mediaSession.metadata = null;
                    navigator.mediaSession.setActionHandler("play", null);
                    navigator.mediaSession.setActionHandler("pause", null);
                    navigator.mediaSession.setActionHandler("seekbackward", null);
                    navigator.mediaSession.setActionHandler("seekforward", null);
                    navigator.mediaSession.setActionHandler("previoustrack", null);
                    navigator.mediaSession.setActionHandler("nexttrack", null);
                }

                player = new YT.Player("player", {
                    with: 0,
                    height: 0,
                    playerVars: {
                        origin: window.location.origin,
                        controls: 0,
                        disablekb: 1,
                        rel: 0,
                        showinfo: 0,
                        iv_load_policy: 3,
                        fs: 0,
                    },
                    events: {
                        onReady: () => {
                            playerReady = true;

                            setInterval(() => {
                                if (player && playerReady && player.getCurrentTime) {
                                    const currentTime = player.getCurrentTime();
                                    const duration = player.getDuration();

                                    const formatTime = (seconds) => {
                                        if (!seconds || isNaN(seconds)) return "0:00";
                                        const mins = Math.floor(seconds / 60);
                                        const secs = Math.floor(seconds % 60);
                                        return `${mins}:${secs < 10 ? "0" : ""}${secs}`;
                                    };

                                    document.getElementById("time-display").textContent =
                                        `${formatTime(currentTime)} / ${formatTime(duration)}`;

                                    const percent = (currentTime / duration) * 100;
                                    document.getElementById("progress-bar").style.width =
                                        percent + "%";
                                }
                            }, 1000);

                            poll();
                            setInterval(poll, 3000);
                        },
                        onStateChange: onPlayerStateChange,
                    },
                });
            }

            function onPlayerStateChange(event) {
                if (event.data === YT.PlayerState.BUFFERING) {
                    console.log("Chargement en cours...");
                    return;
                }
            }

            async function poll() {
                if (!playerReady) return;

                try {
                    const res = await fetch(`/jukebox/${streamToken}/now-playing`);
                    if (!res.ok) {
                        document.getElementById("titlePage").textContent =
                            "Lien invalide ou expiré";
                        return;
                    }

                    const { data } = await res.json();
                    if (!data) {
                        document.getElementById("titlePage").textContent = "Aucune piste en cours";
                        return;
                    }

                    document.getElementById("title").textContent = data.title;
                    const serverElapsed = (Date.now() - new Date(data.startedAt).getTime()) / 1000;
                    const localElapsed = player.getCurrentTime();

                    if (data.providerKey !== lastVideoId) {
                        lastVideoId = data.providerKey;
                        const safeElapsed = Math.max(0, serverElapsed);

                        player.loadVideoById({
                            videoId: data.providerKey,
                            startSeconds: safeElapsed,
                        });

                        const thumbnail = `https://img.youtube.com/vi/${data.providerKey}/maxresdefault.jpg`;
                        document.getElementById("thumbnail").src = thumbnail;
                    } else if (Math.abs(localElapsed - serverElapsed) > OFFSET_TOLERANCE) {
                        console.log("Recalage sur le serveur...");
                        player.seekTo(serverElapsed, true);
                    }

                    if (data.isPlaying !== lastIsPlaying) {
                        if (data.isPlaying) {
                            player.playVideo();
                        } else {
                            player.pauseVideo();
                        }
                        lastIsPlaying = data.isPlaying;
                    }
                } catch (e) {
                    console.error("Sync error", e);
                }
            }

            let isJoined = false;
            document.getElementById("startButton").addEventListener("click", function () {
                this.style.display = "none";
                isJoined = true;
                document.getElementById("titlePage").textContent = "Jukebox actif...";

                if (player) {
                    player.playVideo();
                }
            });

            const volumeSlider = document.getElementById("volumeSlider");
            const muteButton = document.getElementById("muteButton");

            volumeSlider.addEventListener("input", (e) => {
                const vol = e.target.value;
                player.setVolume(vol);

                if (vol == 0) {
                    player.mute();
                    muteButton.textContent = "🔇";
                } else {
                    player.unMute();
                    muteButton.textContent = "🔊";
                }
            });

            muteButton.addEventListener("click", () => {
                if (player.isMuted()) {
                    player.unMute();
                    muteButton.textContent = "🔊";
                    volumeSlider.value = player.getVolume();
                } else {
                    player.mute();
                    muteButton.textContent = "🔇";
                    volumeSlider.value = 0;
                }
            });
        </script>
    </body>
</html>
