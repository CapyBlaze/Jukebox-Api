<!doctype html>
<html>
    <head>
        <title>Jukebox</title>
        <link rel="icon" type="image/png" href="/favicon.png" />
        <style>
            :root {
                --accent-color: #8c97a9;
            }

            body {
                margin: 0;
                background: #8c97a9;
                color: #eee;
                font-family: system-ui;
            }

            body,
            #jukebox-container {
                transition: background 5s ease;
            }

            #info {
                text-align: center;
                padding: 2rem;
            }

            #player {
                display: none;
            }

            #disque {
                animation: rotation 5s linear infinite;
                transform-origin: center;
                transform-box: fill-box;
            }

            #startButton {
                display: flex;
                position: absolute;
                border: none;
                border-radius: 50%;
                width: 80px;
                height: 80px;
                background-color: #e1627e;
                z-index: 100;
                padding: 0;
                transform: translateY(134px);
                cursor: pointer;
                transition: all 0.3s ease;
                box-shadow:
                    0 0 12px rgba(225, 98, 126, 0.7),
                    0 0 35px rgba(225, 98, 126, 0.4);
                align-items: center;
                justify-content: center;
            }

            #startButton:hover {
                transform: translateY(134px) scale(1.05);
                box-shadow:
                    0 0 12px rgba(225, 98, 126, 0.7),
                    0 0 35px rgba(225, 98, 126, 0.4);
            }

            .sillon {
                fill: none;
                stroke: rgba(255, 255, 255, 0.04);
                stroke-width: 0.5;
            }

            .notes-container {
                position: absolute;
                height: 1px;
                width: 190px;
                transform: translateY(-110px);
                overflow: visible;
                pointer-events: none;
            }

            .music-note {
                position: absolute;
                bottom: 0;
                color: #ffffff;
                text-shadow: 0 0 6px rgba(42, 42, 42, 0.6);
                pointer-events: none;
                will-change: transform, opacity;
            }

            .adblock-warning-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background-color: rgba(0, 0, 0, 0.6);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 9999;
            }

            #volume-container {
                display: flex;
                padding: 10px 8px;
                border-radius: 54px;
                background: rgb(255 255 255);
                border: 3px solid black;
                width: 200px;
            }

            #muteButton {
                border: 3px solid black;
                background: var(--accent-color);
                color: #000;
                width: 60px;
                height: 60px;
                border-radius: 50%;
                cursor: pointer;
                box-shadow: 0 0 6px rgba(225, 98, 126, 0.25);
                transition: 0.2s ease;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                display: flex;
                justify-content: center;
                align-items: center;
                left: 0;
                transition: background 5s ease;
            }

            input[type="range"] {
                -webkit-appearance: none;
                appearance: none;
                width: 100%;
                cursor: pointer;
                outline: none;
                border-radius: 15px;

                height: 3px;
                background: #2d2b2a;
                margin: 5px;
                margin-left: 32px;
            }

            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                height: 20px;
                width: 20px;
                background: var(--accent-color);
                border-radius: 50%;
                border: solid 3px #2d2b2a;

                transition: 0.2s ease-in-out;
                transition: background 5s ease;
            }

            input[type="range"]::-moz-range-thumb {
                height: 20px;
                width: 20px;
                background: var(--accent-color);
                border-radius: 50%;
                border: solid 3px #2d2b2a;

                transition: 0.2s ease-in-out;
                transition: background 5s ease;
            }

            #linearGradientStart,
            #linearGradientEnd {
                transition: stop-color 3s ease;
            }

            .screen-text {
                font-family: "Arial", sans-serif;
                color: rgba(255, 255, 255, 0.9);
                text-shadow:
                    0 0 3px rgba(255, 255, 255, 0.4),
                    0 0 12px rgba(255, 255, 255, 0.25);
                font-weight: bold;
                font-size: 13px;
            }

            svg,
            g,
            path {
                overflow: visible !important;
            }

            .defilement-text {
                display: inline-block;
                padding-left: 100%;
                animation: defilement 15s linear infinite;
            }

            .cone-shine {
                mix-blend-mode: screen;
                opacity: 0.35;
            }

            @keyframes defilement {
                0% {
                    transform: translate3d(0, 0, 0);
                }
                100% {
                    transform: translate3d(-100%, 0, 0);
                }
            }

            @keyframes float-note {
                0% {
                    transform: translate(0, 0) rotate(0deg);
                    opacity: 0;
                }
                12% {
                    opacity: 1;
                }
                100% {
                    transform: translate(var(--drift), -220px) rotate(var(--spin));
                    opacity: 0;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .music-note {
                    display: none;
                }
            }

            @keyframes rotation {
                from {
                    transform: rotate(0deg);
                }
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>

        <script>
            const img = document.getElementById("thumbnail");

            function makePale(rgb, amount = 0.6) {
                const [r, g, b] = rgb.match(/\d+/g).map(Number);

                return `rgb(
                    ${Math.round(r + (255 - r) * amount)},
                    ${Math.round(g + (255 - g) * amount)},
                    ${Math.round(b + (255 - b) * amount)}
                )`;
            }

            function extract() {
                const colorThief = new ColorThief();
                const palette = colorThief.getPalette(img, 2);

                const color1 = `rgb(${palette[0].join(",")})`;
                const color2 = `rgb(${palette[1].join(",")})`;

                document.querySelectorAll("#linearGradientStart").forEach((stop) => {
                    stop.setAttribute("stop-color", color1);
                });

                document.querySelectorAll("#linearGradientEnd").forEach((stop) => {
                    stop.setAttribute("stop-color", color2);
                });

                const bgColor = makePale(color2, 0.5);

                document.body.style.background = bgColor;
                document.getElementById("jukebox-container").style.background = bgColor;

                document.documentElement.style.setProperty("--accent-color", makePale(color1, 0.2));
            }

            img.addEventListener("load", extract);

            if (img.complete && img.naturalWidth > 0) {
                extract();
            }
        </script>

        <script>
            const volumeSlider = document.getElementById("volumeSlider");
            const muteButton = document.getElementById("muteButton");

            function volumeIconUpdate(vol, muted) {
                document.getElementById("volume-mute").style.display = "none";
                document.getElementById("volume-off").style.display = "none";
                document.getElementById("volume-low").style.display = "none";
                document.getElementById("volume-medium").style.display = "none";
                document.getElementById("volume-high").style.display = "none";

                if (muted) {
                    document.getElementById("volume-mute").style.display = "inline-block";
                } else if (vol === 0) {
                    document.getElementById("volume-off").style.display = "inline-block";
                } else if (vol < 33) {
                    document.getElementById("volume-low").style.display = "inline-block";
                } else if (vol < 67) {
                    document.getElementById("volume-medium").style.display = "inline-block";
                } else {
                    document.getElementById("volume-high").style.display = "inline-block";
                }
            }

            volumeSlider.addEventListener("input", (e) => {
                const vol = Number(e.target.value);
                player.setVolume(vol);

                let isNowMuted = player.isMuted();

                if (isNowMuted && vol > 0) {
                    player.unMute();
                    isNowMuted = false;
                } else if (!isNowMuted && vol === 0) {
                    player.mute();
                    isNowMuted = true;
                }

                volumeIconUpdate(vol, isNowMuted);
            });

            muteButton.addEventListener("click", () => {
                let isNowMuted;

                if (player.isMuted()) {
                    player.unMute();
                    isNowMuted = false;
                } else {
                    player.mute();
                    isNowMuted = true;
                }

                volumeIconUpdate(Number(volumeSlider.value), isNowMuted);
            });
        </script>
        <script>
            const notesContainer = document.getElementById("notes-container");
            const noteChars = ["♪", "♫", "♬", "♩"];
            const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

            let running = false;
            let intervalId = null;

            function spawnNote() {
                const note = document.createElement("span");
                note.className = "music-note";
                note.textContent = noteChars[Math.floor(Math.random() * noteChars.length)];

                const startX = Math.random() * 100;
                note.style.left = startX + "%";

                const drift = Math.random() * 70 - 35;
                const spin = Math.random() * 50 - 25;
                note.style.setProperty("--drift", drift + "px");
                note.style.setProperty("--spin", spin + "deg");

                const duration = 3 + Math.random() * 2;
                const size = 1 + Math.random() * 0.9;
                note.style.fontSize = size + "rem";

                note.style.animation = `float-note ${duration}s ease-out forwards`;

                notesContainer.appendChild(note);
                setTimeout(() => note.remove(), duration * 1000 + 50);
            }

            function playEffectNote() {
                if (!running && !reduceMotion) {
                    intervalId = setInterval(spawnNote, 450);
                    running = true;
                }
            }

            function stopEffectNote() {
                clearInterval(intervalId);
                running = false;
            }
        </script>
        <script>
            const OFFSET_TOLERANCE = 5; // seconds

            const streamToken = window.location.pathname.split("/").pop();
            let player;
            let playerReady = false;
            let lastVideoId = null;
            let hasJoined = false;
            let locallyPaused = false;
            let currentServerElapsed = 0;
            let lastIsPlaying = false;

            function onYouTubeIframeAPIReady() {
                if ("mediaSession" in navigator) {
                    navigator.mediaSession.metadata = null;
                    navigator.mediaSession.setActionHandler("play", null);
                    navigator.mediaSession.setActionHandler("pause", null);
                    navigator.mediaSession.setActionHandler("seekbackward", null);
                    navigator.mediaSession.setActionHandler("seekforward", null);
                    navigator.mediaSession.setActionHandler("previoustrack", null);
                    navigator.mediaSession.setActionHandler("nexttrack", null);
                }

                player = new YT.Player("player", {
                    with: 0,
                    height: 0,
                    playerVars: {
                        origin: window.location.origin,
                        controls: 0,
                        disablekb: 1,
                        rel: 0,
                        showinfo: 0,
                        iv_load_policy: 3,
                        fs: 0,
                    },
                    events: {
                        onReady: () => {
                            playerReady = true;

                            setInterval(() => {
                                if (player && playerReady && player.getCurrentTime) {
                                    const currentTime = player.getCurrentTime();
                                    const duration = player.getDuration();

                                    const formatTime = (seconds) => {
                                        if (!seconds || isNaN(seconds)) return "0:00";
                                        const mins = Math.floor(seconds / 60);
                                        const secs = Math.floor(seconds % 60);
                                        return `${mins}:${secs < 10 ? "0" : ""}${secs}`;
                                    };

                                    document.getElementById("time-display").textContent =
                                        `${formatTime(currentTime)} / ${formatTime(duration)}`;

                                    const percent = (currentTime / duration) * 100;
                                    document.getElementById("progress-bar").style.width =
                                        percent + "%";

                                    const thumbnailLinkTime = isNaN(currentTime)
                                        ? ``
                                        : `&t=${Math.floor(currentTime)}`;
                                    document.getElementById("thumbnailLink").href =
                                        `https://www.youtube.com/watch?v=${lastVideoId}${thumbnailLinkTime}`;
                                }
                            }, 1000);

                            poll();
                            setInterval(poll, 3000);
                        },
                        onStateChange: onPlayerStateChange,
                    },
                });
            }

            function onPlayerStateChange(event) {
                if (event.data === YT.PlayerState.BUFFERING) {
                    console.log("Loading...");
                    return;
                }
            }

            async function poll() {
                if (!playerReady) return;

                try {
                    const res = await fetch(`/jukebox/${streamToken}/now-playing`);
                    if (!res.ok) {
                        document.getElementById("titleJukebox").textContent =
                            "Invalid or expired link";
                        return;
                    }

                    const { data } = await res.json();
                    if (!data) {
                        document.getElementById("titleJukebox").textContent =
                            "No track currently playing";
                        return;
                    }

                    document.getElementById("titleJukebox").textContent = data.title;

                    const serverElapsed = (Date.now() - new Date(data.startedAt).getTime()) / 1000;
                    const localElapsed = player.getCurrentTime();
                    currentServerElapsed = serverElapsed;

                    if (data.providerKey !== lastVideoId) {
                        lastVideoId = data.providerKey;
                        const safeElapsed = Math.max(0, serverElapsed);

                        player.loadVideoById({
                            videoId: data.providerKey,
                            startSeconds: safeElapsed,
                        });

                        const thumbnail = `https://img.youtube.com/vi/${data.providerKey}/mqdefault.jpg`;
                        document.getElementById("thumbnail").src = thumbnail;
                    } else if (Math.abs(localElapsed - serverElapsed) > OFFSET_TOLERANCE) {
                        console.log("Resetting on the server...");
                        player.seekTo(serverElapsed, true);
                    }

                    if (data.isPlaying !== lastIsPlaying) {
                        if (!data.isPlaying) {
                            player.pauseVideo();
                            stopEffectNote();

                            document.getElementById("play-icon").style.display = "block";
                            document.getElementById("pause-icon").style.display = "none";
                        } else {
                            if (hasJoined && !locallyPaused) {
                                player.playVideo();
                                playEffectNote();

                                document.getElementById("play-icon").style.display = "none";
                                document.getElementById("pause-icon").style.display = "block";
                            }
                        }

                        lastIsPlaying = data.isPlaying;
                    }
                } catch (e) {
                    console.error("Sync error", e);
                }
            }

            document.getElementById("startButton").addEventListener("click", () => {
                hasJoined = true;

                if (player.getPlayerState() === YT.PlayerState.PLAYING) {
                    locallyPaused = true;

                    player.pauseVideo();
                    stopEffectNote();

                    document.getElementById("play-icon").style.display = "block";
                    document.getElementById("pause-icon").style.display = "none";
                } else {
                    locallyPaused = false;

                    if (lastIsPlaying) {
                        player.seekTo(currentServerElapsed, true);
                        player.playVideo();
                        playEffectNote();

                        document.getElementById("play-icon").style.display = "none";
                        document.getElementById("pause-icon").style.display = "block";
                    }
                }
            });
        </script>
    </body>
</html>
