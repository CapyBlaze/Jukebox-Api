name: Deploy API

on:
  push:
    branches:
      - main

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: 🚛 Install dependencies
        run: npm install

      - name: 🛸 Run ESLint
        run: npm run lint

      - name: 🪤 Run tests
        run: npm test

  deploy:
    needs: test

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📡 Deploy SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /root/DuckCorp-Api

            git fetch origin main
            git reset --hard HEAD
            git pull origin main

            npm install
            npm run build
            npx prisma migrate deploy

            systemctl restart duckcorp_api

            for i in {1..10}; do
              if curl -sf http://localhost:8080/system/health; then
                echo "API OK"
                break
              fi
              echo "Waiting API... ($i)"
              sleep 2
            done

            echo "Deploy successful"
